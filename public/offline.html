<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sin conexion</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .box {
        max-width: 26rem;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        background: white;
        padding: 1.2rem;
        text-align: center;
      }
      h1 {
        margin: 0 0 0.4rem;
        font-size: 1.1rem;
      }
      p {
        margin: 0;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <main class="box">
      <h1>Sin conexion a internet</h1>
      <p>Cuando recuperes conectividad, volve a abrir la app para actualizar los datos.</p>
    </main>
  </body>
</html>
